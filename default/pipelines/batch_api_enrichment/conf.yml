output: default
groups: {}
asyncFuncTimeout: 15000
functions:
  - id: comment
    filter: "true"
    disabled: false
    conf:
      comment: >-
        BATCH MODE — ip-api.com Geolocation Enrichment

        How it works:
        - Events are buffered until batchSize (6) events accumulate
        - One POST request is made to ip-api.com/batch with all IPs
        - Response array is matched back to events in order
        - All buffered events are returned together (array of events)
        - exports.flush() handles the final partial batch at end-of-stream

        Example: 12 events flow in → 2 batch API calls of 6 each
          POST http://ip-api.com/batch
          Body: [{"query":"8.8.8.8","fields":"..."},{"query":"1.1.1.1","fields":"..."},...]

        Use the included sample: data/samples/batch_mode_sample.json (12 events)
        Expected output: all 12 events get geo_ fields, but only 2 API calls are made

        KEY BEHAVIORS TO OBSERVE:
        - In Data Preview: events 1-5 show no output, event 6 outputs all 6 at once
        - Events 7-11 show no output, event 12 outputs all 6 at once
        - If the batch were 7 events, flush() would emit the final 5 at stream end
        - Cached IPs (duplicates) are resolved from cache, not sent to the API
  - id: custom_api_lookup
    filter: "true"
    disabled: null
    conf:
      apiBaseUrl: "http://ip-api.com/json"
      valuePosition: path
      queryParamName: "q"
      extraQueryParams: "fields=status,message,country,countryCode,region,regionName,city,zip,lat,lon,timezone,isp,org,as,query"
      lookupField: src_ip
      enrichPrefix: "geo_"
      apiKey: ""
      authType: none
      authHeaderName: "X-API-Key"
      requestMethod: GET
      requestTimeout: 5000
      bodyTemplate: ""
      responseMode: merge_fields
      selectedFields: []
      fieldMappings: []
      staticHeaders: []
      cacheTTL: 300
      rateLimitMs: 0
      batchEnabled: true
      batchSize: 6
      batchUrl: "http://ip-api.com/batch"
    description: "Batch mode: buffer 6 events, one POST to ip-api.com/batch per batch"
