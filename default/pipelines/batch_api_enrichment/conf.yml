output: default
groups: {}
asyncFuncTimeout: 65000
functions:
  - id: comment
    filter: "true"
    disabled: false
    conf:
      comment: >-
        BATCH MODE — ip-api.com Geolocation Enrichment

        Supports batch sizes up to 5,000 events per API call.
        asyncFuncTimeout set to 65s to allow large batches to complete.

        How it works:
        - Events are buffered until batchSize events accumulate
        - One POST request is made to the batch endpoint with all values
        - Response array is matched back to events in order
        - A configurable timer auto-fires partial batches so events don't hang

        IMPORTANT — Data Preview vs Live Traffic:
        In Data Preview, Cribl processes events SEQUENTIALLY — the batch never
        fills and each event fires individually. In LIVE TRAFFIC with concurrent
        workers, batches fill properly and reduce API calls dramatically.

        Note: ip-api.com /batch supports max 100 per call. For larger batches,
        use a custom API endpoint that supports higher limits.

        Use sample: data/samples/batch_mode_12_events.json (12 events)
  - id: custom_api_lookup
    filter: "true"
    disabled: null
    conf:
      apiBaseUrl: "http://ip-api.com/json"
      valuePosition: path
      queryParamName: "q"
      extraQueryParams: "fields=status,message,country,countryCode,region,regionName,city,zip,lat,lon,timezone,isp,org,as,query"
      lookupField: src_ip
      enrichPrefix: "geo_"
      apiKey: ""
      authType: none
      authHeaderName: "X-API-Key"
      requestMethod: GET
      requestTimeout: 30000
      bodyTemplate: ""
      responseMode: merge_fields
      selectedFields: []
      fieldMappings: []
      staticHeaders: []
      cacheTTL: 300
      rateLimitMs: 0
      batchEnabled: true
      batchSize: 6
      batchUrl: "http://ip-api.com/batch"
      batchTimeoutMs: 2000
    description: "Batch mode: buffers events, one POST per batch. Supports up to 5000 events per batch for custom APIs."
