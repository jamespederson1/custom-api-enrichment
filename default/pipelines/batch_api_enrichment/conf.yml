output: default
groups: {}
asyncFuncTimeout: 15000
functions:
  - id: comment
    filter: "true"
    disabled: false
    conf:
      comment: >-
        BATCH MODE — ip-api.com Geolocation Enrichment

        How it works:
        - Events are buffered until batchSize (6) events accumulate
        - One POST request is made to ip-api.com/batch with all IPs
        - Response array is matched back to events in order
        - A 2-second timer auto-fires partial batches so events don't hang

        IMPORTANT — Data Preview vs Live Traffic:
        In Data Preview, Cribl processes events SEQUENTIALLY — it waits for each
        event's Promise to resolve before sending the next one. This means the
        batch never fills up and each event fires individually (like single mode).
        
        In LIVE TRAFFIC with concurrent worker threads, multiple events arrive
        simultaneously and the batch accumulates properly, making one API call
        for N events. This is where batch mode shows its real value.
        
        To verify batch behavior, check the worker logs during live traffic for
        messages like "Custom API Lookup v0.5" showing the batch configuration.

        Use sample: data/samples/batch_mode_12_events.json (12 events)
  - id: custom_api_lookup
    filter: "true"
    disabled: null
    conf:
      apiBaseUrl: "http://ip-api.com/json"
      valuePosition: path
      queryParamName: "q"
      extraQueryParams: "fields=status,message,country,countryCode,region,regionName,city,zip,lat,lon,timezone,isp,org,as,query"
      lookupField: src_ip
      enrichPrefix: "geo_"
      apiKey: ""
      authType: none
      authHeaderName: "X-API-Key"
      requestMethod: GET
      requestTimeout: 5000
      bodyTemplate: ""
      responseMode: merge_fields
      selectedFields: []
      fieldMappings: []
      staticHeaders: []
      cacheTTL: 300
      rateLimitMs: 0
      batchEnabled: true
      batchSize: 6
      batchUrl: "http://ip-api.com/batch"
      batchTimeoutMs: 2000
    description: "Batch mode: buffers events, one POST to ip-api.com/batch per batch (batching works in live traffic, sequential in Preview)"
