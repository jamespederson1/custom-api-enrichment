output: default
groups: {}
asyncFuncTimeout: 10000
functions:
  - id: comment
    filter: "true"
    disabled: false
    conf:
      comment: >-
        Generic API Enrichment Pipeline — Template.
        Configure the function below to point at your custom API endpoint.

        URL CONSTRUCTION:
        The function builds the URL from separate config fields (no template variables needed):
        
          Base URL  +  Value Position  +  Extra Query Params
        
        Examples of how the URL is built at runtime:
        
          Path mode:   https://api.example.com/v1/lookup  +  /8.8.8.8  +  ?fields=all
          Query mode:  https://api.example.com/v1/lookup   +  ?ip=8.8.8.8  +  &format=json
          Body mode:   https://api.example.com/v1/enrich   (value goes in POST body)

        COMMON CONFIGURATIONS:
        - Threat intel:  Base URL = https://api.threatintel.com/v1/ip, Value Position = Path
        - CMDB lookup:   Base URL = https://cmdb.internal.com/api/asset, Value Position = Query, Param = ip
        - GreyNoise:     Base URL = https://api.greynoise.io/v3/ip, Value Position = Path, Auth = Custom Header (key)
        - AbuseIPDB:     Base URL = https://api.abuseipdb.com/api/v2/check, Value Position = Query, Param = ipAddress
        - VirusTotal:    Base URL = https://www.virustotal.com/api/v3/ip_addresses, Value Position = Path, Auth = Custom Header (x-apikey)
  - id: custom_api_lookup
    filter: "true"
    disabled: null
    conf:
      apiBaseUrl: "https://your-api.example.com/v1/lookup"
      valuePosition: path
      queryParamName: "q"
      extraQueryParams: ""
      lookupField: src_ip
      enrichPrefix: "enrich_"
      apiKey: ""
      authType: bearer
      authHeaderName: "X-API-Key"
      requestMethod: GET
      requestTimeout: 5000
      bodyTemplate: ""
      responseMode: merge_fields
      selectedFields: ""
      fieldMappings: ""
      staticHeaders: ""
      cacheTTL: 300
      rateLimitMs: 100
    description: "Generic API enrichment — edit Base URL, auth, and field settings for your API"
