output: default
groups: {}
asyncFuncTimeout: 10000
functions:
  - id: comment
    filter: "true"
    disabled: false
    conf:
      comment: >-
        SINGLE EVENT MODE — ip-api.com Geolocation Enrichment

        How it works:
        - Each event triggers its own HTTP GET to ip-api.com
        - The src_ip value is appended to the Base URL path
        - Response fields are merged into the event with geo_ prefix
        - Results are cached for 300s to avoid duplicate lookups

        Example: event with src_ip=8.8.8.8 calls:
          GET http://ip-api.com/json/8.8.8.8?fields=status,message,country,...

        Use the included sample: data/samples/single_mode_sample.json (3 events)
        Expected output: each event gets geo_country, geo_city, geo_isp, etc.
  - id: custom_api_lookup
    filter: "true"
    disabled: null
    conf:
      apiBaseUrl: "http://ip-api.com/json"
      valuePosition: path
      queryParamName: "q"
      extraQueryParams: "fields=status,message,country,countryCode,region,regionName,city,zip,lat,lon,timezone,isp,org,as,query"
      lookupField: src_ip
      enrichPrefix: "geo_"
      apiKey: ""
      authType: none
      authHeaderName: "X-API-Key"
      requestMethod: GET
      requestTimeout: 5000
      bodyTemplate: ""
      responseMode: merge_fields
      selectedFields: ""
      fieldMappings: ""
      staticHeaders: ""
      cacheTTL: 300
      rateLimitMs: 0
      batchEnabled: false
      batchSize: 10
      batchUrl: "http://ip-api.com/batch"
    description: "Single mode: one HTTP call per event to ip-api.com"
