output: default
groups: {}
asyncFuncTimeout: 10000
functions:
  - id: comment
    filter: "true"
    disabled: false
    conf:
      comment: >-
        ip-api.com Geolocation Enrichment Pipeline.
        Enriches events with IP geolocation as data flows through Cribl Stream.
        Free API, no auth required.
        
        Resulting URL per event: http://ip-api.com/json/8.8.8.8?fields=status,message,...
        The lookup value from src_ip is appended to the Base URL path automatically.
  - id: custom_api_lookup
    filter: "true"
    disabled: null
    conf:
      apiBaseUrl: "http://ip-api.com/json"
      valuePosition: path
      queryParamName: "q"
      extraQueryParams: "fields=status,message,country,countryCode,region,regionName,city,zip,lat,lon,timezone,isp,org,as,query"
      lookupField: src_ip
      enrichPrefix: "geo_"
      apiKey: ""
      authType: none
      authHeaderName: "X-API-Key"
      requestMethod: GET
      requestTimeout: 5000
      bodyTemplate: ""
      responseMode: merge_fields
      selectedFields: []
      fieldMappings: []
      staticHeaders: []
      cacheTTL: 300
      rateLimitMs: 0
    description: "Enrich events with IP geolocation from ip-api.com"
