output: default
groups: {}
asyncFuncTimeout: 10000
functions:
  - id: comment
    filter: "true"
    disabled: false
    conf:
      comment: >-
        Custom API Enrichment Pipeline.
        Calls ip-api.com (free, no auth) to enrich events with IP geolocation
        as data flows through the pipeline. Uses async custom function with
        in-memory caching to minimize API calls.
        
        To adapt for your own API: edit the custom_api_lookup function settings below.
  - id: custom_api_lookup
    filter: "true"
    disabled: null
    conf:
      apiUrl: "http://ip-api.com/json/{{value}}?fields=status,message,country,countryCode,region,regionName,city,zip,lat,lon,timezone,isp,org,as,query"
      apiKey: ""
      authType: none
      authHeaderName: "X-API-Key"
      lookupField: src_ip
      enrichPrefix: "geo_"
      requestMethod: GET
      requestTimeout: 5000
      bodyTemplate: ""
      responseMode: merge_fields
      selectedFields: []
      fieldMappings: []
      staticHeaders: []
      cacheTTL: 300
      rateLimitMs: 0
    description: "Enrich events with IP geolocation from ip-api.com (adaptable to any REST API)"
